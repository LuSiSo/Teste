<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Simples</title>
</head>
<body>

    <h2>Calculadora</h2>

    <input type="text" id="num1" placeholder="Digite o primeiro número">
    <input type="text" id="num2" placeholder="Digite o segundo número">
    <br><br>

    <button onclick="somar()">Somar</button>
    <button onclick="subtrair()">Subtrair</button>
    <button onclick="multiplicar()">Multiplicar</button>
    <button onclick="dividir()">Dividir</button>

    <h3>Resultado: <span id="resultado"></span></h3>

    <script>
        function pegarValores() {
            let n1 = parseFloat(document.getElementById("num1").value);
            let n2 = parseFloat(document.getElementById("num2").value);
            return { n1, n2 };
        }

        function somar() {
            let { n1, n2 } = pegarValores();
            document.getElementById("resultado").innerText = n1 + n2;
        }

        function subtrair() {
            let { n1, n2 } = pegarValores();
            document.getElementById("resultado").innerText = n1 - n2;
        }

        function multiplicar() {
            let { n1, n2 } = pegarValores();
            document.getElementById("resultado").innerText = n1 * n2;
        }

        function dividir() {
            let { n1, n2 } = pegarValores();
            if (n2 === 0) {
                document.getElementById("resultado").innerText = "Não pode dividir por zero!";
            } else {
                document.getElementById("resultado").innerText = n1 / n2;
            }
        }
    </script>

</body>
</html>
